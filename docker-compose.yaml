# mcpgate AI Gateway
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up -d
#   3. curl http://localhost:3001/health
#
# Ports:
#   3000 — MCP protocol (Claude/ChatGPT connects here)
#   3001 — Dashboard, OAuth callbacks, health check
#
# Hot-reload config without restart:
#   curl -X POST http://localhost:3001/admin/reload

services:
  ai-gateway:
    image: mcpgate/mcpgate:latest
    env_file: .env
    ports:
      - "${MCP_SERVER_PORT:-3000}:3000"
      - "${OAUTH_PORT:-3001}:3001"
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      # Tell admin dashboard to persist imports to the mounted data dir
      - EXTENSIONS_DATA_DIR=/app/data/extensions
    volumes:
      # Config files (editable, changes applied via POST /admin/reload)
      - ./config/access_control.yaml:/app/config/access_control.yaml
      - ./config/tool_hooks.yaml:/app/config/tool_hooks.yaml
      # Persistent data dir — admin dashboard saves OpenAPI imports here
      - gateway-data:/app/data

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  gateway-data:
  redis-data:
