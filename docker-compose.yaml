services:
  ai-gateway:
    image: registry.gitlab.com/mcpgate/ai-gateway:latest
    env_file: .env
    ports:
      - "${MCP_PORT:-3000}:3000"
      - "${OAUTH_PORT:-3001}:3001"
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ./config:/config:ro

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
