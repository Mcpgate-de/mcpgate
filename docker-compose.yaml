# mcpgate AI Gateway
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up -d
#   3. curl http://localhost:3001/health
#
# Ports:
#   3000 — MCP protocol (Claude/ChatGPT connects here)
#   3001 — Dashboard, OAuth callbacks, health check

services:
  ai-gateway:
    image: registry.gitlab.com/mcpgate/ai-gateway:latest
    env_file: .env
    ports:
      - "${MCP_SERVER_PORT:-3000}:3000"
      - "${OAUTH_PORT:-3001}:3001"
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ./config:/config:ro

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
